services:
  server:
    image: alpine:latest
    devices: ["/dev/net/tun:/dev/net/tun"]
    cap_add: [NET_ADMIN]
    ports: ["1194:1194/udp"]
    volumes: ["./ovpn-static:/config"]
    command: ["sh", "-c", "apk add --no-cache openvpn && openvpn --config /config/server.conf"]

  client:
    image: alpine:latest
    devices: ["/dev/net/tun:/dev/net/tun"]
    cap_add: [NET_ADMIN]
    volumes: ["./ovpn-static:/config"]
    command:
      - sh
      - -c
      - |
        apk add --no-cache openvpn tcpdump iproute2
        openvpn --config /config/client.conf &
        while ! ip link show tun0 >/dev/null 2>&1; do sleep 1; done
        tcpdump -i eth0 -U -w /tmp/test.pcap udp port 1194 &
        TCPDUMP_PID=$!
        sleep 2
        ping -c 10 10.8.0.1
        kill $TCPDUMP_PID
        wait $TCPDUMP_PID
        echo "OpenVPN capture finished."
    depends_on: [server]

