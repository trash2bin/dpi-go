name: ${COMPOSE_PROJECT_NAME:-dpi}

x-go-test-env: &go-test-env
  GOCACHE: /tmp/go-build
  GOTMPDIR: /tmp/go-tmp

x-go-test-tmpfs: &go-test-tmpfs
  - /tmp/go-build:rw,exec,nosuid,size=512m
  - /tmp/go-tmp:rw,exec,nosuid,size=512m

services:
  dpi:
    image: ${DPI_IMAGE:-dpi:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ../:/app
    working_dir: /app
    command: ["dpi", "-config", "/app/configs/dpi.docker.toml"]
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      net_client:
        ipv4_address: 172.28.1.2
      net_target:
        ipv4_address: 172.28.2.2
      external: {}

  client:
    image: ${DPI_CLIENT_IMAGE:-dpi-client:local}
    build:
      context: ..
      dockerfile: docker/client/Dockerfile
    privileged: true
    cap_add:
      - NET_ADMIN
    networks:
      net_client:
        ipv4_address: 172.28.1.3
    depends_on:
      - dpi

  target:
    image: nginx:1.27-alpine
    networks:
      net_target:
        ipv4_address: 172.28.2.4
    # Fix backwoard path
    command:
      [
        "sh",
        "-c",
        "ip route add 172.28.1.0/24 via 172.28.2.2 && nginx -g 'daemon off;'",
      ]

  test:
    image: ${DPI_TEST_IMAGE:-dpi-test:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: test
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment: *go-test-env
    tmpfs: *go-test-tmpfs
    volumes:
      - ../:/app
    working_dir: /app
    command: ["go", "test", "./...", "-count=1", "-v"]
    networks:
      net_client:
        ipv4_address: 172.28.1.5
    depends_on:
      - dpi

  integration:
    image: ${DPI_TEST_IMAGE:-dpi-test:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: test
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment: *go-test-env
    tmpfs: *go-test-tmpfs
    volumes:
      - ../:/app
    working_dir: /app
    command:
      [
        "go",
        "test",
        "-tags=integration",
        "./tests/integration",
        "-count=1",
        "-v",
      ]
    networks:
      net_client:
        ipv4_address: 172.28.1.6
    depends_on:
      - dpi

networks:
  net_client:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24
  net_target:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.2.0/24
  external:
    driver: bridge
